services:
  lb:
    build: ./lb
    container_name: load-balancer
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
    networks:
      - lb-network
    depends_on:
      - node1
      - node2
      - node3
    restart: unless-stopped

  node1:
    build: ./worker
    container_name: worker-node-1
    environment:
      - PORT=3001
      - NODE_ID=node-1
      - CONCURRENCY=4
      - MAX_QUEUE_SIZE=200
    networks:
      - lb-network
    restart: unless-stopped
    # No port mapping — internal only

  node2:
    build: ./worker
    container_name: worker-node-2
    environment:
      - PORT=3002
      - NODE_ID=node-2
      - CONCURRENCY=4
      - MAX_QUEUE_SIZE=200
    networks:
      - lb-network
    restart: unless-stopped

  node3:
    build: ./worker
    container_name: worker-node-3
    environment:
      - PORT=3003
      - NODE_ID=node-3
      - CONCURRENCY=4
      - MAX_QUEUE_SIZE=200
    networks:
      - lb-network
    restart: unless-stopped

networks:
  lb-network:
    driver: bridge
