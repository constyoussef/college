# ─── Paxos Distributed System — Docker Compose ─────────────
#
# Launches 5 identical Paxos nodes on a shared network.
# Each node gets a unique NODE_ID and knows all peers via NODE_LIST.
#
# Usage:
#   docker-compose up --build
#   docker-compose down

# Shared network so all containers can resolve each other by name
networks:
  paxos-net:
    driver: bridge

# ─── Common configuration (YAML anchor) ────────────────────
x-node-common: &node-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  networks:
    - paxos-net
  environment: &node-env
    PORT: "3000"
    NODE_LIST: "node1:3000,node2:3000,node3:3000,node4:3000,node5:3000"
  restart: "no"

services:
  # ─── Node 1 ────────────────────────────────────────────────
  node1:
    <<: *node-common
    container_name: paxos-node-1
    environment:
      <<: *node-env
      NODE_ID: "1"

  # ─── Node 2 ────────────────────────────────────────────────
  node2:
    <<: *node-common
    container_name: paxos-node-2
    environment:
      <<: *node-env
      NODE_ID: "2"

  # ─── Node 3 ────────────────────────────────────────────────
  node3:
    <<: *node-common
    container_name: paxos-node-3
    environment:
      <<: *node-env
      NODE_ID: "3"

  # ─── Node 4 ────────────────────────────────────────────────
  node4:
    <<: *node-common
    container_name: paxos-node-4
    environment:
      <<: *node-env
      NODE_ID: "4"

  # ─── Node 5 ────────────────────────────────────────────────
  node5:
    <<: *node-common
    container_name: paxos-node-5
    environment:
      <<: *node-env
      NODE_ID: "5"
